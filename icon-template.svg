<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07080C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E1018;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGradient)"/>
  
  <!-- Subtle particles -->
  <circle cx="100" cy="100" r="3" fill="#D4AF37" opacity="0.3"/>
  <circle cx="400" cy="120" r="2" fill="#D4AF37" opacity="0.2"/>
  <circle cx="150" cy="380" r="2.5" fill="#D4AF37" opacity="0.25"/>
  <circle cx="380" cy="350" r="2" fill="#D4AF37" opacity="0.2"/>
  
  <!-- Main circle -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#goldGradient)" stroke-width="6" opacity="0.3"/>
  
  <!-- Letter E -->
  <text 
    x="256" 
    y="306" 
    font-family="Georgia, serif" 
    font-size="240" 
    font-weight="900" 
    fill="url(#goldGradient)" 
    text-anchor="middle"
    filter="url(#glow)"
  >E</text>
  
  <!-- Small crown on top of E (optional) -->
  <text 
    x="256" 
    y="140" 
    font-size="60"
    text-anchor="middle"
  >👑</text>
</svg>
