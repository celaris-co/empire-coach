<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Empire Coach</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;background:#07080C;color:#D4AF37;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;">
<div id="root">Loading...</div>
<script type="text/babel">
const App = () => {
  const [count, setCount] = React.useState(0);
  return (
    <div style={{textAlign:'center'}}>
      <h1>EMPIRE COACH</h1>
      <p>Test React: {count}</p>
      <button onClick={() => setCount(count + 1)} style={{padding:'10px 20px',fontSize:'16px'}}>
        Click
      </button>
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
