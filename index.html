<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#07080C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Empire Coach">
  <meta name="description" content="Construis ton empire. Sans limite. Parcours d'apprentissage infini alimenté par l'IA.">
  
  <title>Empire Coach - Construis ton empire</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #07080C;
      color: #E5E7EB;
      position: fixed;
      overscroll-behavior: none;
    }
    
    #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    .loading-screen {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #07080C 0%, #0E1018 100%);
    }
    
    .loading-logo {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(135deg, #D4AF37 0%, #FFD700 50%, #D4AF37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div class="loading-logo">EMPIRE COACH</div>
    </div>
  </div>

  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered:', reg))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>

  <!-- App -->
  <script type="text/babel" data-type="module">
    // Check if React loaded
    if (!window.React || !window.ReactDOM) {
      document.getElementById('root').innerHTML = '<div class="loading-screen"><div class="loading-logo">Erreur: React non chargé</div></div>';
    } else {
      // Fetch and execute the JSX
      fetch('EmpireCoach.jsx')
        .then(res => res.text())
        .then(code => {
          // Execute the JSX code
          const script = document.createElement('script');
          script.type = 'text/babel';
          script.text = code + '\nconst root = ReactDOM.createRoot(document.getElementById("root")); root.render(React.createElement(EmpireCoach));';
          document.body.appendChild(script);
        })
        .catch(err => {
          console.error('Error loading app:', err);
          document.getElementById('root').innerHTML = '<div class="loading-screen"><div class="loading-logo" style="font-size:16px;max-width:80%;text-align:center;">Erreur de chargement. Recharge la page.</div></div>';
        });
    }
  </script>
</body>
</html>
