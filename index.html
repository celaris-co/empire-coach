<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Empire Coach</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body,html{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#07080C,#0E1018);color:#E5E7EB}
#root{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px}
.logo{font-size:48px;font-weight:900;background:linear-gradient(135deg,#D4AF37,#FFD700,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px;animation:pulse 2s infinite}
.tagline{font-size:18px;color:#9CA3AF;margin-bottom:40px}
.btn{background:linear-gradient(135deg,#D4AF37,#FFD700);color:#000;border:none;padding:18px 60px;border-radius:50px;font-size:20px;font-weight:700;cursor:pointer;box-shadow:0 10px 30px rgba(212,175,55,.4)}
.chat{width:100%;max-width:500px;height:80vh;display:flex;flex-direction:column;background:rgba(17,24,39,.8);border-radius:16px;overflow:hidden}
.msgs{flex:1;overflow-y:auto;padding:20px}
.msg{margin-bottom:16px;padding:12px 16px;border-radius:12px;max-width:80%}
.user{background:#3B82F6;color:#fff;margin-left:auto}
.ai{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.2)}
.input-box{display:flex;padding:16px;gap:12px;background:rgba(17,24,39,.9)}
.input-box input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px;color:#E5E7EB;font-size:15px}
.input-box button{background:linear-gradient(135deg,#D4AF37,#FFD700);color:#000;border:none;padding:12px 24px;border-radius:12px;font-weight:700;cursor:pointer}
.loading{color:#D4AF37;font-size:14px;margin:10px 0}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useRef,useEffect}=React;
const e=React.createElement;

function App(){
  const[screen,setScreen]=useState('splash');
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(false);
  const hist=useRef([]);

  const send=async()=>{
    if(!input.trim()||loading)return;
    const key=localStorage.getItem('apiKey');
    if(!key){
      const k=prompt('Entre ta clé API Anthropic:');
      if(!k)return;
      localStorage.setItem('apiKey',k);
    }
    
    const userMsg={role:'user',content:input};
    setMsgs(prev=>[...prev,userMsg]);
    hist.current.push(userMsg);
    setInput('');
    setLoading(true);

    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key':localStorage.getItem('apiKey'),
          'anthropic-version':'2023-06-01'
        },
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:2000,
          messages:hist.current
        })
      });
      const data=await res.json();
      if(data.error){
        alert('Erreur API: '+data.error.message);
        setLoading(false);
        return;
      }
      const aiMsg={role:'assistant',content:data.content[0].text};
      hist.current.push(aiMsg);
      setMsgs(prev=>[...prev,aiMsg]);
    }catch(err){
      alert('Erreur: '+err.message);
    }
    setLoading(false);
  };

  if(screen==='splash'){
    return e('div',{style:{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',textAlign:'center',padding:'20px'}},
      e('div',{className:'logo'},'EMPIRE COACH'),
      e('div',{className:'tagline'},'Construis ton empire. Sans limite.'),
      e('button',{className:'btn',onClick:()=>setScreen('chat')},'▶ COMMENCER')
    );
  }

  return e('div',{className:'chat'},
    e('div',{className:'msgs'},
      msgs.length===0&&e('div',{style:{textAlign:'center',color:'#9CA3AF',marginTop:'40px'}},'Dis "Salut" pour commencer !'),
      msgs.map((m,i)=>
        e('div',{key:i,className:'msg '+(m.role==='user'?'user':'ai')},m.content)
      ),
      loading&&e('div',{className:'loading'},'💭 Coach réfléchit...')
    ),
    e('div',{className:'input-box'},
      e('input',{
        value:input,
        onChange:ev=>setInput(ev.target.value),
        onKeyPress:ev=>ev.key==='Enter'&&send(),
        placeholder:'Ton message...'
      }),
      e('button',{onClick:send},'➤')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
