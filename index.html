<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empire Coach</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;font-family:system-ui;background:linear-gradient(135deg,#07080C,#0E1018);color:#E5E7EB}
#root{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column}
.loading{font-size:48px;font-weight:900;background:linear-gradient(135deg,#D4AF37,#FFD700,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.btn{margin-top:40px;background:linear-gradient(135deg,#D4AF37,#FFD700);color:#000;border:none;padding:16px 40px;border-radius:50px;font-size:18px;font-weight:700;cursor:pointer}
.msg{margin-top:20px;font-size:14px;color:#9CA3AF}
</style>
</head>
<body>
<div id="root">
<div class="loading">EMPIRE COACH</div>
<div class="msg">Chargement de l'app (10-15 sec)...</div>
</div>
<script>
setTimeout(() => {
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/@babel/standalone/babel.min.js';
  script.onload = () => {
    const jsx = document.createElement('script');
    jsx.type = 'text/babel';
    jsx.src = 'app.js';
    document.body.appendChild(jsx);
  };
  document.head.appendChild(script);
}, 1000);
</script>
</body>
</html>
